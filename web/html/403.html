<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 Forbidden</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 60px 40px;
            text-align: center;
            max-width: 500px;
            width: 100%;
            animation: slideIn 0.6s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .error-code {
            font-size: 120px;
            font-weight: 700;
            color: #ee5a6f;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(238, 90, 111, 0.2);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        .error-title {
            font-size: 28px;
            color: #333;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .error-message {
            font-size: 16px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .icon {
            font-size: 64px;
            margin-bottom: 20px;
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% {
                transform: translateX(0);
            }
            25% {
                transform: translateX(-5px);
            }
            75% {
                transform: translateX(5px);
            }
        }

        .details {
            background: #fff5f5;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 25px;
            text-align: left;
        }

        .details h3 {
            font-size: 14px;
            color: #333;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .details ul {
            list-style: none;
            padding: 0;
        }

        .details li {
            font-size: 14px;
            color: #666;
            padding: 8px 0;
            border-bottom: 1px solid #ffe0e0;
        }

        .details li:last-child {
            border-bottom: none;
        }

        .details li:before {
            content: "•";
            color: #ee5a6f;
            font-weight: bold;
            margin-right: 10px;
        }

        .button {
            display: inline-block;
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
            color: white;
            padding: 12px 30px;
            border-radius: 25px;
            text-decoration: none;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(238, 90, 111, 0.3);
            margin: 0 10px;
        }

        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(238, 90, 111, 0.4);
        }

        .button-secondary {
            background: white;
            color: #ee5a6f;
            border: 2px solid #ee5a6f;
            box-shadow: 0 4px 15px rgba(238, 90, 111, 0.1);
        }

        .button-secondary:hover {
            background: #fff5f5;
            box-shadow: 0 6px 20px rgba(238, 90, 111, 0.2);
        }

        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🔒</div>
        <div class="error-code">403</div>
        <div class="error-title">Forbidden</div>
        <div class="error-message">
            抱歉，您没有权限访问此页面。
        </div>

        <div class="details">
            <h3>可能的原因：</h3>
            <ul>
                <li>您未登录或登录已过期</li>
                <li>您的IP地址不在白名单中</li>
                <li>您的账户没有访问权限</li>
                <li>服务器配置了访问限制</li>
            </ul>
        </div>

        <div>
            <a href="/" class="button button-secondary">返回首页</a>
        </div>

        <div class="footer">
            如果问题持续存在，请联系系统管理员
        </div>
    </div>
</body>
</html>
