name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name'
        required: true
        default: 'v0.0.0'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install zip
        run: sudo apt-get update && sudo apt-get install -y zip

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create release directory
        run: mkdir -p release

      - name: Build Windows amd64
        env:
          GOOS: windows
          GOARCH: amd64
        run: |
          go build -ldflags "-s -w" -o CorazaWafProxy.exe .
          zip -r release/CorazaWafProxy_windows_amd64.zip CorazaWafProxy.exe config/ coreruleset/ static/ web/

      - name: Build Linux amd64
        env:
          GOOS: linux
          GOARCH: amd64
        run: |
          go build -ldflags "-s -w" -o CorazaWafProxy .
          tar -czf release/CorazaWafProxy_linux_amd64.tar.gz CorazaWafProxy config/ coreruleset/ static/ web/

      - name: Build Linux arm64
        env:
          GOOS: linux
          GOARCH: arm64
        run: |
          go build -ldflags "-s -w" -o CorazaWafProxy .
          tar -czf release/CorazaWafProxy_linux_arm64.tar.gz CorazaWafProxy config/ coreruleset/ static/ web/

      - name: Build macOS amd64
        env:
          GOOS: darwin
          GOARCH: amd64
        run: |
          go build -ldflags "-s -w" -o CorazaWafProxy .
          tar -czf release/CorazaWafProxy_darwin_amd64.tar.gz CorazaWafProxy config/ coreruleset/ static/ web/

      - name: Build macOS arm64 (Apple Silicon)
        env:
          GOOS: darwin
          GOARCH: arm64
        run: |
          go build -ldflags "-s -w" -o CorazaWafProxy .
          tar -czf release/CorazaWafProxy_darwin_arm64.tar.gz CorazaWafProxy config/ coreruleset/ static/ web/

      - name: Create SHA256 checksums
        run: |
          cd release
          sha256sum *.zip *.tar.gz > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: Coraza WAF Proxy ${{ steps.version.outputs.VERSION }}
          body: |
            ## Coraza WAF Proxy ${{ steps.version.outputs.VERSION }}

            ### Download
            - Windows (x86_64): `CorazaWafProxy_windows_amd64.zip`
            - Linux (x86_64): `CorazaWafProxy_linux_amd64.tar.gz`
            - Linux (ARM64): `CorazaWafProxy_linux_arm64.tar.gz`
            - macOS (x86_64): `CorazaWafProxy_darwin_amd64.tar.gz`
            - macOS (ARM64): `CorazaWafProxy_darwin_arm64.tar.gz`

            ### Checksums
            See `SHA256SUMS.txt` for file integrity checksums.
          files: |
            release/*.zip
            release/*.tar.gz
            release/SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}